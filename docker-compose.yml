services:
  db:
    image: mysql:8.0
    container_name: ijbnet_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_changeme
      MYSQL_DATABASE: ijbnet_db
      MYSQL_USER: ijbnet
      MYSQL_PASSWORD: changeme
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - ijbnet
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-proot_changeme']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: ijbnet_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
      - "::1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ijbnet

volumes:
  db_data:
  redis_data:

networks:
  ijbnet:
    driver: bridge
    enable_ipv6: true
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1
        - subnet: fd00:db8::/64
          gateway: fd00:db8::1
