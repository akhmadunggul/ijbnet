services:
  db:
    image: mysql:8.0
    container_name: ijbnet_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_changeme
      MYSQL_DATABASE: ijbnet_db
      MYSQL_USER: ijbnet
      MYSQL_PASSWORD: changeme
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - ijbnet
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-proot_changeme']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: ijbnet_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
      - "::1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ijbnet

  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: ijbnet_libretranslate
    restart: unless-stopped
    environment:
      - LT_LOAD_ONLY=id,en,ja
      - LT_API_KEYS=false
      - LT_HOST=0.0.0.0
      - LT_PORT=5000
      - LT_UPDATE_MODELS=false
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - lt_models:/home/libretranslate/.local/share
    networks:
      - ijbnet
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:5000/languages']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  db_data:
  redis_data:
  lt_models:

networks:
  ijbnet:
    driver: bridge
    enable_ipv6: true
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1
        - subnet: fd00:db8::/64
          gateway: fd00:db8::1
