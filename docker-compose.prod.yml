services:
  db:
    image: mysql:8.0
    container_name: ijbnet_db
    restart: unless-stopped
    command: >
      --max_connections=250
      --innodb_buffer_pool_size=1G
      --innodb_buffer_pool_instances=2
      --max_allowed_packet=64M
      --slow_query_log=1
      --long_query_time=2
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_changeme}
      MYSQL_DATABASE: ${DB_NAME:-ijbnet_db}
      MYSQL_USER: ${DB_USER:-ijbnet}
      MYSQL_PASSWORD: ${DB_PASS:-changeme}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - ijbnet
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', "-p${MYSQL_ROOT_PASSWORD:-root_changeme}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: ijbnet_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ijbnet

  image-processor:
    build:
      context: apps/image-processor
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - hf_cache:/opt/hf-cache
    networks:
      - ijbnet
    healthcheck:
      test: ['CMD', 'python3', '-c', 'import urllib.request; urllib.request.urlopen("http://localhost:8000/health")']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile.prod
    #container_name: ijbnet_backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: db
      REDIS_URL: redis://redis:6379
      HF_TOKEN: ${HF_TOKEN:-}
      UV_THREADPOOL_SIZE: 64
      # Cap Node.js heap to 2 GB — leaves room for MySQL buffer pool + OS
      NODE_OPTIONS: --max-old-space-size=2048
      CLUSTER_WORKERS: "1"
    ports:
      - "127.0.0.1:3001:3001"   # loopback-only — used by Caddy (host network) and k6 tests
      - "::1:3001:3001"         # IPv6 loopback
    volumes:
      - uploads_data:/app/uploads
      - hf_cache:/opt/hf-cache
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      image-processor:
        condition: service_healthy
    networks:
      - ijbnet
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3001/api/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: ijbnet_prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - ijbnet

  grafana:
    image: grafana/grafana:10.4.0
    container_name: ijbnet_grafana
    restart: unless-stopped
    environment:
      GF_SERVER_ROOT_URL: https://jinzai.jobagus.id/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-IJBNet@Grafana2025}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    ports:
      - "127.0.0.1:3000:3000"   # loopback-only — used by Caddy (host network)
      - "::1:3000:3000"         # IPv6 loopback
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - ijbnet

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile.caddy
      args:
        CADDY_ENV: prod
    container_name: ijbnet_frontend
    restart: unless-stopped
    # network_mode: host — Caddy binds directly to the host network stack so it
    # sees real client IPs (IPv4 + IPv6) instead of the Docker bridge gateway.
    # Ports 80/443 are claimed by Caddy on the host; no port mappings needed.
    network_mode: host
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
  redis_data:
  uploads_data:
  hf_cache:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:

networks:
  ijbnet:
    driver: bridge
    enable_ipv6: true
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1
        - subnet: fd00:db8::/64
          gateway: fd00:db8::1
