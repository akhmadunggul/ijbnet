services:
  db:
    image: mysql:8.0
    container_name: ijbnet_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_changeme}
      MYSQL_DATABASE: ${DB_NAME:-ijbnet_db}
      MYSQL_USER: ${DB_USER:-ijbnet}
      MYSQL_PASSWORD: ${DB_PASS:-changeme}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - ijbnet
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', "-p${MYSQL_ROOT_PASSWORD:-root_changeme}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: ijbnet_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ijbnet

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile.prod
    container_name: ijbnet_backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: db
      REDIS_URL: redis://redis:6379
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - ijbnet
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3001/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile.caddy
    container_name: ijbnet_frontend
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:80"
      - "[::]:80:80"
      - "0.0.0.0:443:443"
      - "[::]:443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ijbnet

volumes:
  db_data:
  redis_data:
  uploads_data:
  caddy_data:
  caddy_config:

networks:
  ijbnet:
    driver: bridge
    enable_ipv6: true
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1
        - subnet: fd00:db8::/64
          gateway: fd00:db8::1
