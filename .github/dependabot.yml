version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "security"
      - "dependencies"

  # Root workspace (shared package + monorepo tooling)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      security-patch:
        applies-to: security-updates
        patterns: ["*"]
    labels:
      - "security"
      - "dependencies"

  # Backend workspace
  - package-ecosystem: "npm"
    directory: "/apps/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      security-patch:
        applies-to: security-updates
        patterns: ["*"]
    labels:
      - "security"
      - "dependencies"
      - "backend"

  # Frontend workspace
  - package-ecosystem: "npm"
    directory: "/apps/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      security-patch:
        applies-to: security-updates
        patterns: ["*"]
    labels:
      - "security"
      - "dependencies"
      - "frontend"
