name: Security Scan (Strix)

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/backend/src/**'
      - 'apps/frontend/src/**'
      - 'apps/backend/package.json'

jobs:
  strix-scan:
    name: AI Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # allow posting scan results as PR comment

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # required for --scan-mode quick (diff-scoping)

      - name: Install Strix (pinned release + checksum)
        env:
          # Pin to a specific release. Update STRIX_VERSION + SHA256 together
          # when upgrading. Get SHA256 from: https://github.com/usestrix/strix/releases
          STRIX_VERSION: "0.1.13"
          STRIX_SHA256: "REPLACE_WITH_ACTUAL_SHA256_FROM_RELEASE_PAGE"
        run: |
          curl -sSL \
            "https://github.com/usestrix/strix/releases/download/v${STRIX_VERSION}/strix-linux-amd64" \
            -o strix
          echo "${STRIX_SHA256}  strix" | sha256sum -c
          chmod +x strix
          sudo mv strix /usr/local/bin/strix

      - name: Run Strix security scan
        env:
          STRIX_LLM: anthropic/claude-haiku-4-5-20251001
          LLM_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          strix -n \
            -t ./apps/backend/src \
            --scan-mode quick \
            --report-format json \
            --output strix-report.json

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strix-security-report
          path: strix-report.json
          retention-days: 30

      - name: Comment PR with findings
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = '## Strix Security Scan — Vulnerabilities Found\n\n';
            try {
              const report = JSON.parse(fs.readFileSync('strix-report.json', 'utf8'));
              const findings = report.findings ?? [];
              if (findings.length === 0) {
                summary += 'No critical findings.';
              } else {
                findings.slice(0, 10).forEach(f => {
                  summary += `- **${f.severity ?? 'UNKNOWN'}** — ${f.title ?? f.type ?? 'Finding'}: \`${f.location ?? ''}\`\n`;
                });
                if (findings.length > 10) summary += `\n_...and ${findings.length - 10} more. Download the full report artifact._`;
              }
            } catch {
              summary += '_Could not parse report. Download the artifact for details._';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
